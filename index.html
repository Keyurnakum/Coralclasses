<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#14b8c4" />
    <meta name="description" content="CoralClasses - modern coaching classes with a mobile-friendly learning experience." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CoralClasses" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="apple-touch-icon" href="/logo.jpeg" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <title>CoralClasses</title>
    <script>
      window.mgt = window.mgt || {};
      if (typeof window.mgt.clearMarks !== 'function') {
        window.mgt.clearMarks = function () {};
      }
      window.addEventListener(
        'error',
        function (event) {
          if (String(event.message).includes('mgt.clearMarks is not a function')) {
            event.preventDefault();
          }
        },
        true,
      );
      window.addEventListener('unhandledrejection', function (event) {
        if (String(event.reason).includes('mgt.clearMarks is not a function')) {
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
